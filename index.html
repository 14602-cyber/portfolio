<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#5B86E5,#36D1DC);
    overflow:hidden;
}

/* พื้นหลังวงกลม */
body::before{
    content:'';
    position:absolute;
    width:300px;
    height:300px;
    background:rgba(255,255,255,.15);
    border-radius:50%;
    top:-100px;
    left:-100px;
}

body::after{
    content:'';
    position:absolute;
    width:350px;
    height:350px;
    background:rgba(255,255,255,.15);
    border-radius:50%;
    bottom:-150px;
    right:-100px;
}

/* กล่องหลัก */
.container{
    width:350px;
    padding:30px;
    text-align:center;

    background:rgba(255,255,255,.15);
    backdrop-filter:blur(12px);

    border-radius:25px;
    border:1px solid rgba(255,255,255,.3);

    color:white;

    animation:popup .8s ease;
}

/* รูปโปรไฟล์ */
.profile{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;

    border:5px solid white;

    animation:float 3s ease-in-out infinite;
}

h1{
    margin-top:20px;
    font-size:30px;
}

p{
    opacity:.9;
    margin-bottom:25px;
}

/* เมนู */
.menu{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.menu a{
    text-decoration:none;
    color:white;

    padding:15px;

    border-radius:15px;

    background:rgba(255,255,255,.15);

    transition:.3s;
    font-weight:bold;
}

.menu a:hover{
    transform:translateY(-5px) scale(1.05);

    background:white;
    color:#3f51b5;

    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

/* Popup */
@keyframes popup{
    from{
        transform:scale(.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

/* รูปลอย */
@keyframes float{
    0%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-10px);
    }
    100%{
        transform:translateY(0px);
    }
}

</style>
</head>

<body>

<div class="container">

<img src="images/profile.jpg" class="profile">

<h1>ปุณยาพร บุญวิจิตร</h1>

<p>Welcome to My Portfolio</p>

<div class="menu">

<a href="about.html">👤 ประวัติส่วนตัว</a>

<a href="hobbies.html">🎨 งานอดิเรก</a>

<a href="contact.html">📞 ช่องทางการติดต่อ</a>

</div>

</div>

</body>
</html>
