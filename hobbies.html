<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>งานอดิเรก</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <h1>🎨 งานอดิเรก</h1>

    <div class="hobby-grid">

        <div class="hobby-card">
            <div class="icon">🎵</div>
            <h2>ฟังเพลง</h2>
            <p>ชอบฟังเพลงเพื่อความผ่อนคลายและเพิ่มสมาธิในการทำกิจกรรมต่าง ๆ</p>
        </div>

        <div class="hobby-card">
            <div class="icon">🎨</div>
            <h2>วาดรูป</h2>
            <p>ชอบวาดภาพเพื่อฝึกจินตนาการและพัฒนาความคิดสร้างสรรค์</p>
        </div>

        <div class="hobby-card">
            <div class="icon">📚</div>
            <h2>อ่านหนังสือ</h2>
            <p>ชอบอ่านหนังสือเพื่อเพิ่มความรู้และเปิดมุมมองใหม่ ๆ</p>
        </div>

    </div>

    <a href="index.html" class="btn">🏠 กลับหน้าหลัก</a>

</div>

</body>
</html>
